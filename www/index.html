<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vora Playground</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><text y='28' font-size='28'>⚡</text></svg>">
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<style>
  :root {
    --bg:       #0d1117;
    --surface:  #161b22;
    --border:   #30363d;
    --text:     #e6edf3;
    --dim:      #8b949e;
    --accent:   #58a6ff;
    --accent2:  #f78166;
    --green:    #3fb950;
    --red:      #f85149;
    --yellow:   #d2991d;
    --purple:   #a371f7;
    --radius:   8px;
    --mono:     'Cascadia Code', 'Fira Code', 'JetBrains Mono', 'Consolas', 'SF Mono', monospace;
    --sans:     'Segoe UI', system-ui, -apple-system, sans-serif;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: var(--sans);
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    opacity: 0;
  }

  /* ── Header ─────────────────────────────────────────────────── */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 20px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    z-index: 10;
  }
  .brand {
    display: flex;
    align-items: center;
    gap: 10px;
    opacity: 0;
  }
  .brand svg { width: 28px; height: 28px; }
  .brand h1 { font-size: 1.1rem; font-weight: 600; letter-spacing: 0.02em; }
  .brand h1 span { color: var(--accent); }
  .brand .ver { color: var(--dim); font-size: 0.7rem; font-weight: 400; margin-left: 4px; }

  .toolbar { display: flex; gap: 8px; align-items: center; opacity: 0; }
  .btn {
    padding: 7px 16px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text);
    font-size: 0.82rem;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s;
    font-family: var(--sans);
    white-space: nowrap;
  }
  .btn:hover { background: #1f2937; border-color: #58a6ff55; }
  .btn-primary {
    background: #1f6feb;
    border-color: #1f6feb;
    color: #fff;
    font-weight: 600;
    letter-spacing: 0.02em;
  }
  .btn-primary:hover { background: #388bfd; border-color: #388bfd; }
  .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }
  .shortcut { color: var(--dim); font-size: 0.7rem; margin-left: 4px; }

  /* ── Main layout ────────────────────────────────────────────── */
  main {
    flex: 1;
    display: flex;
    overflow: hidden;
  }
  .pane {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-width: 0;
  }
  .pane-left {
    border-right: 1px solid var(--border);
    opacity: 0;
  }
  .pane-right { opacity: 0; }

  .pane-header {
    font-size: 0.65rem;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--dim);
    padding: 8px 16px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    user-select: none;
  }
  .pane-header .dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--dim);
    transition: background 0.3s;
  }
  .pane-header .dot.ok { background: var(--green); }
  .pane-header .dot.err { background: var(--red); }

  textarea {
    flex: 1;
    background: transparent;
    color: var(--text);
    border: none;
    padding: 18px 20px;
    font-family: var(--mono);
    font-size: 0.88rem;
    line-height: 1.6;
    resize: none;
    outline: none;
    tab-size: 4;
  }
  textarea::placeholder { color: #30363d; }

  #output {
    flex: 1;
    padding: 18px 20px;
    font-family: var(--mono);
    font-size: 0.82rem;
    line-height: 1.6;
    white-space: pre-wrap;
    overflow-y: auto;
    color: var(--text);
    opacity: 0;
  }
  #output.error { color: var(--red); }

  /* ── Status bar ─────────────────────────────────────────────── */
  .status {
    font-size: 0.7rem;
    padding: 5px 16px;
    background: var(--surface);
    border-top: 1px solid var(--border);
    color: var(--dim);
    display: flex;
    align-items: center;
    gap: 8px;
    opacity: 0;
  }
  .status .indicator {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--dim);
    transition: background 0.3s;
  }
  .status .indicator.ok { background: var(--green); }
  .status .indicator.err { background: var(--red); }

  /* ── Toast ──────────────────────────────────────────────────── */
  .toast {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 10px 20px;
    border-radius: 20px;
    font-size: 0.8rem;
    color: var(--text);
    z-index: 100;
    pointer-events: none;
    opacity: 0;
    box-shadow: 0 8px 24px rgba(0,0,0,0.4);
  }

  /* ── Dropdown ───────────────────────────────────────────────── */
  .dropdown {
    position: relative;
    display: inline-block;
  }
  .dropdown-menu {
    display: none;
    position: absolute;
    top: calc(100% + 6px);
    right: 0;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    max-height: 360px;
    overflow-y: auto;
    min-width: 220px;
    z-index: 50;
    box-shadow: 0 12px 40px rgba(0,0,0,0.5);
  }
  .dropdown-menu.show { display: block; }
  .dropdown-menu button {
    display: block;
    width: 100%;
    text-align: left;
    padding: 8px 14px;
    font-size: 0.8rem;
    border: none;
    background: transparent;
    color: var(--text);
    cursor: pointer;
    font-family: var(--sans);
    transition: background 0.1s;
  }
  .dropdown-menu button:hover { background: #1f2937; }
  .dropdown-menu button + button { border-top: 1px solid var(--border); }

  /* ── Scrollbar ──────────────────────────────────────────────── */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>

<!-- ═══ Header ═══════════════════════════════════════════════════ -->
<header>
  <div class="brand" id="brand">
    <svg viewBox="0 0 32 32" fill="none">
      <rect x="2" y="2" width="28" height="28" rx="6" stroke="#58a6ff" stroke-width="2"/>
      <path d="M10 22V10l6 8 6-8v12" stroke="#e6edf3" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    <h1>Vora <span>Playground</span></h1>
    <span class="ver">v0.1</span>
  </div>
  <div class="toolbar" id="toolbar">
    <div class="dropdown">
      <button class="btn" id="btn-examples">Examples ▾</button>
      <div class="dropdown-menu" id="dropdown-menu"></div>
    </div>
    <button class="btn btn-primary" id="btn-run" disabled onclick="runCode()">Run ▶</button>
    <span class="shortcut">Ctrl+Enter</span>
  </div>
</header>

<!-- ═══ Main ══════════════════════════════════════════════════════ -->
<main>
  <div class="pane pane-left" id="pane-left">
    <div class="pane-header">
      <span>Vora Script (.va)</span>
      <span class="dot" id="editor-dot"></span>
    </div>
    <textarea id="code" spellcheck="false" placeholder="// Write Vora code here..."></textarea>
  </div>
  <div class="pane pane-right" id="pane-right">
    <div class="pane-header">
      <span>Output</span>
      <span class="dot" id="output-dot"></span>
    </div>
    <pre id="output">Click <strong>Run ▶</strong> or press <strong>Ctrl+Enter</strong> to execute.</pre>
  </div>
</main>

<!-- ═══ Status ═══════════════════════════════════════════════════ -->
<div class="status" id="status">
  <span class="indicator" id="status-indicator"></span>
  <span id="status-text">Loading Vora WASM module…</span>
</div>

<!-- ═══ Toast ════════════════════════════════════════════════════ -->
<div class="toast" id="toast"></div>

<!-- ═══ Scripts ══════════════════════════════════════════════════ -->
<script src="vora_wasm.js"></script>
<script src="vora.js"></script>
<script>
/* ── DOM refs ─────────────────────────────────────────────────── */
const $   = s => document.querySelector(s);
const $$  = s => document.querySelectorAll(s);
const codeEl   = $('#code');
const outputEl = $('#output');
const statusEl = $('#status');
const statusTxt = $('#status-text');
const statusInd = $('#status-indicator');
const runBtn    = $('#btn-run');
const editorDot = $('#editor-dot');
const outputDot = $('#output-dot');
const toastEl   = $('#toast');

/* ── Examples ─────────────────────────────────────────────────── */
const examples = {
  '01 · Literals': `// Vora examples/01-literals.va
let n = 42
let pi = 3.14
let s1 = "hello"
let t = true
let f = false
let nothing = null
print("=== literals ===")
print(n)
print(pi)
print(s1)
print(t)
print(f)
print(nothing)`,

  '04 · Variables': `// Vora examples/04-variables.va
let x = 10
print(x)
x = 20
print(x)
{
    let y = 99
    print(y)
    let x = 100
    print(x)
}
print(x)`,

  '05 · If-Else': `// Vora examples/05-if-else.va
let score = 85
if (score >= 90) {
    print("A")
} else if (score >= 80) {
    print("B")
} else if (score >= 70) {
    print("C")
} else {
    print("F")
}`,

  '06 · While': `// Vora examples/06-while.va
let i = 0
while (i < 5) {
    print(i)
    i = i + 1
}
print("---")
let j = 0
while (true) {
    if (j == 3) { break }
    print(j)
    j = j + 1
}`,

  '07 · For-In': `// Vora examples/07-for-in.va
print("=== array ===")
for item in [10, 20, 30] { print(item) }
print("=== string ===")
for ch in "Vora" { print(ch) }
print("=== range(5) ===")
for i in range(5) { print(i) }
print("=== range(2, 6) ===")
for i in range(2, 6) { print(i) }`,

  '08 · Functions': `// Vora examples/08-functions.va
func add(a, b) { return a + b }
print("7 + 5 = " + add(7, 5))

func makeCounter() {
    let count = 0
    func inc() { count += 1; return count }
    return inc
}
let c = makeCounter()
print(c())  // 1
print(c())  // 2
print(c())  // 3

func twice(fn, x) { return fn(fn(x)) }
func double(n) { return n * 2 }
print("twice(double, 10) = " + twice(double, 10))`,

  '09 · Objects': `// Vora examples/09-objects.va
Obj Person(name, age) {
    this.name = name
    this.age = age
    func greet() {
        print("I'm " + this.name + ", age " + this.age)
    }
    func birthday() {
        this.age = this.age + 1
    }
}
let alice = Person("Alice", 25)
alice.greet()
alice.age = 26
alice.birthday()
print("new age: " + alice.age)`,

  '10 · Arrays': `// Vora examples/10-arrays.va
let arr = [1, 2, 3]
print(arr)
print("arr[0] = " + arr[0])
print("arr[2] = " + arr[2])
let mixed = [42, "hello", true, null]
print(mixed)
let a = [1, 2]
let b = [3, 4]
print("concat: " + toString(a + b))`,

  '19 · Try-Catch': `// Vora examples/19-try-catch.va
try {
    let x = 1 / 0
    print("this should not print")
} catch (e) {
    print("Caught error:", e)
}
print("=== try/finally ===")
try {
    print("Inside try")
} finally {
    print("Finally block executed")
}`,

  '20 · Custom Errors': `// Vora examples/20-throw-custom-error.va
print("=== throw string ===")
try {
    throw "something went wrong"
} catch (e) {
    print("Caught:", e)
}
print("=== custom error object ===")
Obj ValidationError(msg) {
    this.message = msg
}
try {
    throw ValidationError("Invalid input")
} catch (e) {
    print("Caught:", e.message)
}`,

  '21 · Inheritance': `// Vora examples/21-inheritance.va
Obj Animal(name) {
    this.name = name
    func speak() { print("Generic sound") }
}
Obj Dog : Animal(name, breed) {
    this.breed = breed
    func speak() {
        print("Woof! I'm " + this.name + " the " + this.breed)
    }
}
let d = Dog("Rex", "Husky")
print("Name: " + d.name + ", Breed: " + d.breed)
d.speak()`,

  '28 · Super': `// Vora examples/28-super.va
Obj A() {
    func chain() { return "A" }
}
Obj B : A() {
    func chain() { return super.chain() + " → B" }
}
Obj C : B() {
    func chain() { return super.chain() + " → C" }
}
let c = C()
print("chain:", c.chain())`,

  '29 · Error Flow': `// Vora examples/29-error-propagation.va
Obj AppError(msg, code) {
    this.message = msg
    this.code = code
}
func check(value) {
    if (value == null) {
        throw AppError("required", "value")
    }
    if (value < 0) {
        throw AppError("must be positive", "value")
    }
    return value * 2
}
try { print("check(10) = " + check(10)) }
catch (e) { print("unreachable") }
try { print("check(null) = " + check(null)) }
catch (e) { print("Error: " + e.message + " on '" + e.field + "'") }`,

  '30 · Closures': `// Vora examples/30-closures.va
func makeMultiplier(factor) {
    func multiply(x) { return x * factor }
    return multiply
}
let double = makeMultiplier(2)
let triple = makeMultiplier(3)
print("double(5) = " + double(5))
print("triple(5) = " + triple(5))

let log = []
func makeLogger(name) {
    func logMsg(msg) { log.add(name + ": " + msg) }
    return logMsg
}
let info = makeLogger("INFO")
info("hello")
info("world")
print(toString(log))`,

  '43 · Match': `// Vora examples/43-match.va
func describe(n) {
    return match n {
        0 => "zero", 1 => "one", 2 => "two", _ => "many"
    }
}
print("0:", describe(0))
print("5:", describe(5))

let grade = match 85 {
    90..=100 => "A", 80..=89 => "B",
    70..=79 => "C", 60..=69 => "D", _ => "F"
}
print("grade 85:", grade)
print("sum: " + (match 1 { 1 => 10, _ => 0 }) + (match 2 { 2 => 20, _ => 0 }))`
};

/* ── Init dropdown ────────────────────────────────────────────── */
const dropMenu = $('#dropdown-menu');
Object.keys(examples).forEach(name => {
  const btn = document.createElement('button');
  btn.textContent = name;
  btn.addEventListener('click', () => {
    codeEl.value = examples[name];
    resetOutput();
    dropMenu.classList.remove('show');
    toast('Loaded: ' + name);
    gsap.fromTo(codeEl, { opacity: 0.3, y: 6 }, { opacity: 1, y: 0, duration: 0.35, ease: 'power2.out' });
  });
  dropMenu.appendChild(btn);
});

$('#btn-examples').addEventListener('click', (e) => {
  e.stopPropagation();
  dropMenu.classList.toggle('show');
  if (dropMenu.classList.contains('show')) {
    gsap.fromTo(dropMenu, { opacity: 0, y: -6 }, { opacity: 1, y: 0, duration: 0.2, ease: 'power2.out' });
  }
});
document.addEventListener('click', () => dropMenu.classList.remove('show'));

/* ── Set initial code ─────────────────────────────────────────── */
codeEl.value = `// Vora Playground — powered by WebAssembly
print("Hello from Vora in the browser!")
print("1 + 1 = " + (1 + 1))

// Objects
Obj Person(name, age) {
    this.name = name
    this.age = age
    this.greet = func() { return "Hi, I'm " + this.name }
}
let p = Person("Asamo", 25)
print(p.greet())

// Control flow
for (let i = 1; i <= 5; i = i + 1) {
    print("  count: " + i)
}
`;

/* ── Toast ────────────────────────────────────────────────────── */
let toastTimer;
function toast(msg) {
  clearTimeout(toastTimer);
  toastEl.textContent = msg;
  gsap.to(toastEl, { opacity: 1, y: 0, duration: 0.25, ease: 'power2.out' });
  toastTimer = setTimeout(() => {
    gsap.to(toastEl, { opacity: 0, y: 20, duration: 0.35, ease: 'power2.in' });
  }, 1800);
}

/* ── Status helpers ───────────────────────────────────────────── */
function setStatus(text, type) {
  statusTxt.textContent = text;
  statusInd.className = 'indicator';
  if (type === 'ok')  statusInd.classList.add('ok');
  if (type === 'err') statusInd.classList.add('err');
}
function resetOutput() {
  outputEl.textContent = '';
  outputEl.className = '';
  outputDot.className = 'dot';
  gsap.set(outputEl, { opacity: 1, y: 0 });
}

/* ── Run ──────────────────────────────────────────────────────── */
window.runCode = function() {
  const src = codeEl.value.trim();
  if (!src) { toast('Nothing to run'); return; }

  resetOutput();
  setStatus('Running…', '');
  editorDot.className = 'dot';

  // Button pulse
  gsap.fromTo(runBtn, { scale: 1 }, { scale: 0.94, duration: 0.08, yoyo: true, repeat: 1, ease: 'power2.inOut' });

  // Use rAF so the UI updates before the blocking WASM call
  requestAnimationFrame(() => {
    let result;
    try {
      result = VoraWasm.run(src);
    } catch (e) {
      result = { ok: false, error: 'Bridge error: ' + e.message };
    }

    if (result.ok) {
      const out = result.output || '(no output)';
      outputEl.textContent = out;
      outputEl.className = '';
      outputDot.className = 'dot ok';
      editorDot.className = 'dot ok';
      setStatus('OK — completed.', 'ok');

      gsap.fromTo(outputEl, { opacity: 0, y: 10 }, { opacity: 1, y: 0, duration: 0.4, ease: 'power2.out' });
    } else {
      outputEl.textContent = result.error || 'Unknown error';
      outputEl.className = 'error';
      outputDot.className = 'dot err';
      editorDot.className = 'dot err';
      setStatus('Error — see output.', 'err');

      gsap.fromTo(outputEl, { opacity: 0, y: 10 }, { opacity: 1, y: 0, duration: 0.4, ease: 'power2.out' });
      gsap.fromTo(outputEl, { x: -4 }, { x: 4, duration: 0.06, repeat: 5, yoyo: true, ease: 'power2.inOut' }); // shake
    }
  });
};

/* ── Keyboard shortcut ────────────────────────────────────────── */
document.addEventListener('keydown', (e) => {
  if (e.ctrlKey && e.key === 'Enter') { e.preventDefault(); runCode(); }
});

/* ── Init WASM ────────────────────────────────────────────────── */
(async function init() {
  try {
    await VoraWasm.init();
    setStatus('Ready — WASM module loaded.', 'ok');
    runBtn.disabled = false;
  } catch (e) {
    setStatus('Failed to load WASM: ' + e.message, 'err');
    outputEl.textContent = 'Failed to initialize Vora WASM module.\n\n' + e.message;
    outputEl.className = 'error';
    console.error(e);
  }

  /* ── Entrance animation ────────────────────────────────────── */
  const tl = gsap.timeline({ defaults: { duration: 0.5, ease: 'power2.out' } });
  tl.to(document.body,  { opacity: 1, duration: 0.3 })
    .fromTo('#brand',   { opacity: 0, y: -10 }, { opacity: 1, y: 0 }, '-=0.1')
    .fromTo('#toolbar', { opacity: 0, y: -8 },  { opacity: 1, y: 0 }, '-=0.3')
    .fromTo('#pane-left',  { opacity: 0, x: -16 }, { opacity: 1, x: 0 }, '-=0.2')
    .fromTo('#pane-right', { opacity: 0, x: 16 },  { opacity: 1, x: 0 }, '-=0.35')
    .fromTo('#status',     { opacity: 0, y: 6 },   { opacity: 1, y: 0 }, '-=0.3');
})();
</script>
</body>
</html>
